name: hark_platform
description: Platform plugin for Hark — type-safe Dart↔Kotlin bridge via Pigeon.
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.11.3
  flutter: '>=3.32.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  pigeon: ^22.7.4
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.oacp.hark_platform
        pluginClass: HarkPlatformPlugin
